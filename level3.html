        .cs{font-size:.73rem;color:var(--muted);margin-top:3px}
        .cb{padding:26px}

        .decl-table td{padding:5px 8px;border:1px solid var(--bdr);text-align:center;font-family:'Tiro Devanagari Sanskrit',serif}

        .qbw{height:6px;background:var(--s3);border-radius:3px;margin-bottom:22px;overflow:hidden}

        .qsc b{color:var(--gold2)}

        .qq{font-size:1.06rem;font-weight:700;margin-bottom:6px;line-height:1.5}
        .qsub{font-family:'Tiro Devanagari Sanskrit',serif;font-size:1.55rem;color:var(--gold2);margin-top:7px;line-height:1.8}

        .opt{background:var(--s2);border:2px solid var(--bdr2);border-radius:var(--r2);padding:14px;cursor:pointer;text-align:center;font-family:'Tiro Devanagari Sanskrit',serif;font-size:1rem;color:var(--txt);transition:all .2s;line-height:1.6}

        .opt:hover:not([disabled]){border-color:var(--saffron);transform:scale(1.025)}

        .opt.wrong{border-color:var(--fem)!important;background:rgba(244,114,182,.1)!important;color:#fbcfe8!important}

        .fb{border-radius:var(--r2);padding:13px 16px;margin-bottom:14px;font-size:.82rem;line-height:1.6}
        .fb.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.28);color:#6ee7b7}
        .fb.wrong{background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.28);color:#fbcfe8}
        .rp{text-align:center;padding:44px 16px}
        .rem{font-size:4.2rem;display:block;margin-bottom:14px}
        .rscore{font-size:4rem;font-weight:900;margin-bottom:8px}
        .rscore.win{background:linear-gradient(135deg,var(--neut),#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .rscore.lose{background:linear-gradient(135deg,var(--fem),#fbcfe8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .rdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700}
        .rdot.ok{background:rgba(52,211,153,.18);border:2px solid rgba(52,211,153,.45);color:#6ee7b7}
        .rdot.wrong{background:rgba(244,114,182,.18);border:2px solid rgba(244,114,182,.45);color:#fbcfe8}

        .bv{background:linear-gradient(135deg,var(--self),#7c3aed);color:#fff}.bv:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(167,139,250,.4)}

        .brow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}
        .hidden{display:none!important}
    </style>
</head>

          {q:{k:"मीनः ___ तरति। (सप्तमी)",e:"Fish swims in ___. (Locative)"},o:["जलम्","जलेन","जले","जलात्"],a:2},
          {q:{k:"पक्षिणः ___ कूजन्ति। (सप्तमी)",e:"Birds chirp on ___. (Locative)"},o:["वृक्षे","वृक्षम्","वृक्षेण","वृक्षात्"],a:0},
          {q:{k:"सः ___ वसति। (सप्तमी)",e:"He lives in ___. (Locative)"},o:["नगरम्","नगरे","नगरेण","नगरात्"],a:1},
          {q:{k:"सा ___ वसति। (सप्तमी)",e:"She lives in ___. (Locative)"},o:["ग्रामम्","ग्रामेण","ग्रामे","ग्रामात्"],a:2},
          {q:{k:"छात्रः ___ पठति। (सप्तमी)",e:"Student reads in ___. (Locative)"},o:["शालायाम्","शालाम्","शालया","शालायाः"],a:0},
          {q:{k:"जलं ___ अस्ति। (सप्तमी)",e:"Water is in ___. (Locative)"},o:["चषकम्","चषके","चषकेन","चषकात्"],a:1},
          {q:{k:"धनं ___ अस्ति। (सप्तमी)",e:"Money is in ___. (Locative)"},o:["स्यूतम्","स्यूतेन","स्यूते","स्यूतात्"],a:2},
          {q:{k:"पुष्पाणि ___ विकसन्ति। (सप्तमी)",e:"Flowers bloom in ___. (Locative)"},o:["वने","वनम्","वनेन","वनात्"],a:0}
        ];

        // ---------- Utility ----------
        function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }

        // ---------- Build vibhakti table ----------
        function buildVibhakti(){
            const body = document.getElementById('vib-body');
            body.innerHTML = VIBHAKTIS.map(v=>`<tr>
                <td><span class="vbnum">${v.n}</span></td>
                <td><span class="vbnm">${LANG==='k'?v.nm.k:v.nm.e}</span></td>
                <td><span class="vbsk">${v.sk}</span></td>
                <td>${LANG==='k'?v.kn.k:v.kn.e}</td>
                <td><span class="vbex">${v.ex}</span></td>
            </tr>`).join('');
        }

        // ---------- Build paradigm table with expand buttons ----------
        function buildParadigm(){
            const body = document.getElementById('paradigm-body');
            body.innerHTML = PARADIGMS.map(p=>`<tr>
                <td>${p.sno}</td>
                <td>${p.cat}</td>
                <td style="font-family:'Tiro Devanagari Sanskrit',serif;">
                    ${p.stem}
                    <button class="exp-btn" onclick="toggleDecl(${p.sno})">➕</button>
                </td>
                <td style="font-family:'Tiro Devanagari Sanskrit',serif;color:var(--gold2)">${p.nom.sg}</td>
                <td style="font-family:'Tiro Devanagari Sanskrit',serif;color:var(--gold2)">${p.nom.du}</td>
                <td style="font-family:'Tiro Devanagari Sanskrit',serif;color:var(--gold2)">${p.nom.pl}</td>
            </tr>
            <tr id="decl-${p.sno}" class="decl-row">
                <td colspan="7" style="padding:0;border:none;">
                    <div style="padding:12px 18px;background:var(--s2);">
                        <div style="font-weight:700;margin-bottom:8px;color:var(--muted)">Full declension: ${p.stem}</div>
                        <table class="decl-table"><thead><tr>
                            <th>Case</th><th>एकवचन</th><th>द्विवचन</th><th>बहुवचन</th>
                        </tr></thead><tbody>
                            ${p.decl.map((v,i)=>`<tr>
                                <td style="font-weight:600;color:var(--gold2)">${caseNames[i]}</td>
                                <td>${v[0]}</td><td>${v[1]}</td><td>${v[2]}</td>
                            </tr>`).join('')}
                        </tbody></table>
                    </div>
                </td>
            </tr>`).join('');
        }

        // ---------- Toggle declension row ----------
        function toggleDecl(sno){
            const row = document.getElementById('decl-'+sno);
            if (row) {
                row.classList.toggle('open');
                row.scrollIntoView({behavior:'smooth',block:'center'});
            }
        }

        // ---------- Quiz engine (Part 3) ----------
        const QST = {3:{sess:[],idx:0,ans:[],done:false,started:false}};

        function initQ(part){
            const s=QST[part];
            if(s.started&&!s.done){ renderQ(part); return; }
            if(s.done){ renderQResult(part); return; }
            document.getElementById('quiz-3-body').innerHTML=`<div style="text-align:center;padding:40px 0">
                <div style="font-size:3rem;margin-bottom:14px">📝</div>
                <div style="font-size:1.1rem;font-weight:800;margin-bottom:8px">Vibhakti Quiz</div>
                <div style="font-size:.84rem;color:var(--muted);margin-bottom:18px">50‑Q bank · 10 random · <b style="color:var(--saffron)">10/10 to unlock!</b></div>
                <button class="btn bp" onclick="startQ(3)">Start Quiz →</button>
            </div>`;
        }

        function startQ(part){
            const pool = shuffle([...part3Bank]).slice(0,10);
            QST[part].sess = pool.map(q=>{
                const si=shuffle([0,1,2,3]);
                return {...q, so:si.map(i=>q.o[i]), sa:si.indexOf(q.a)};
            });
            QST[part].idx=0; QST[part].ans=[]; QST[part].done=false; QST[part].started=true;
            renderQ(part);
        }

        function renderQ(part){
            const s=QST[part], q=s.sess[s.idx], total=s.sess.length;
            const pct=(s.idx/total)*100, answered=s.ans[s.idx]!==undefined;
            const score=s.ans.reduce((t,a,i)=>t+(a===s.sess[i].sa?1:0),0);
            const qText = LANG==='k'?q.q.k:q.q.e;
            const hasSub = qText.includes('___');
            document.getElementById('quiz-3-body').innerHTML=`
                <div class="qsc">Q <b>${s.idx+1}</b>/${total} · Score: <b>${score}</b></div>
                <div class="qbw"><div class="qb" style="width:${pct}%"></div></div>
                <div class="qcard"><div class="qnum">Part 3 · Q${s.idx+1}</div>
                    ${hasSub?`<div class="qsub">${qText}</div>`:`<div class="qq">${qText}</div>`}
                </div>
                <div class="opts">
                    ${q.so.map((o,i)=>{
                        let cls='opt';
                        if(answered){if(i===q.sa)cls+=' ok';else if(i===s.ans[s.idx])cls+=' wrong';}
                        return `<button class="${cls}" onclick="selQ(${part},${i})" ${answered?'disabled':''}><span class="ol">${['A','B','C','D'][i]}</span><span style="font-family:'Tiro Devanagari Sanskrit',serif">${o}</span></button>`;
                    }).join('')}
                </div>
                ${answered?`<div class="fb ${s.ans[s.idx]===q.sa?'ok':'wrong'}">${s.ans[s.idx]===q.sa?'✅ Correct!':'❌ Wrong! ✔ '+q.so[q.sa]}</div>
                <div class="brow"><button class="btn bp" onclick="${s.idx<total-1?'nextQ(3)':'submitQ(3)'}">${s.idx<total-1?'Next →':'Result 🏁'}</button></div>`:
                `<div style="text-align:center;font-size:.74rem;color:var(--muted2)">Click an option</div>`}`;
        }

        function selQ(part,i){ const s=QST[part]; if(s.ans[s.idx]!==undefined) return; s.ans[s.idx]=i; renderQ(part); }
        function nextQ(part){ QST[part].idx++; renderQ(part); }

        function submitQ(part){
            QST[part].done=true;
            const s=QST[part], total=s.sess.length;
            const score=s.ans.reduce((t,a,i)=>t+(a===s.sess[i].sa?1:0),0), win=score===total;
            document.getElementById('quiz-3-body').innerHTML=`<div class="rp">
                <span class="rem">${score===total?'🎉':'😔'}</span>
                <div class="rscore ${win?'win':'lose'}">${score}/${total}</div>
                <div class="rmsg">${win?'Congratulations! Level 4 Unlocked!':'Try again!'}</div>
                <div class="rdots">${s.ans.map((a,i)=>`<div class="rdot ${a===s.sess[i].sa?'ok':'wrong'}">${i+1}</div>`).join('')}</div>
                <div class="brow">
                    <button class="btn bg" onclick="QST[3]={sess:[],idx:0,ans:[],done:false,started:false};initQ(3)">↺ Retry</button>
                    ${win?`<a href="level4.html" class="btn bp">Level 4 →</a>`:''}
                </div>
            </div>`;
            if(win){
                const pl = loadPlayer()||{name:'',lang:LANG,highestUnlockedLevel:1};
                if(pl.highestUnlockedLevel < 4) pl.highestUnlockedLevel = 4;
                savePlayer(pl);
            }
        }

        // ---------- Tab switching ----------
        function showT(id,btn,navId){
            const nav=document.getElementById(navId); nav.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
            btn.classList.add('on');
            document.querySelectorAll('[id^="p3-"]').forEach(el=>el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // ---------- Language toggle ----------
        function toggleLang(){
            LANG = LANG==='e'?'k':'e';
            const pl = loadPlayer();
            if(pl){ pl.lang = LANG; savePlayer(pl); }
            document.getElementById('lang-label').textContent = LANG==='e'?'ಕನ್ನಡ':'English';
            buildVibhakti();
            buildParadigm();
        }

        // ---------- Init ----------
        document.addEventListener('DOMContentLoaded',()=>{
            const pl = loadPlayer();
            LANG = (pl && pl.lang) || 'e';
            document.getElementById('lang-label').textContent = LANG==='e'?'ಕನ್ನಡ':'English';
            buildVibhakti();
            buildParadigm();
        });
    </script>
</body>
</html>
